<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FastAPI App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card center-card">
            <h1>FastAPI User System</h1>
            <p class="subtitle">Login to manage your personal todos.</p>

            <button id="enterLoginBtn">Login</button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("token");

        if (token) {
            window.location.href = "dashboard.html";
        }

        document.getElementById("enterLoginBtn").addEventListener("click", () => {
            window.location.href = "login.html";
        });
    </script>
</body>
</html>
